<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>:root{font-family:Inter,system-ui,sans-serif;color:#e8eefc;background:#101521}*{box-sizing:border-box}body{margin:0;padding:14px}.card{background:#171e2d;border:1px solid #2a354a;border-radius:14px;padding:14px}.head{display:flex;justify-content:space-between;gap:12px;align-items:center}.title{font-size:17px;font-weight:700}.muted{color:#9cabc4;font-size:12px}.stats{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.pill{background:#222c40;border-radius:999px;padding:6px 9px;font-size:12px}.files{display:grid;gap:7px;max-height:280px;overflow:auto}.file{display:flex;gap:8px;background:#111827;border-radius:9px;padding:8px;font-size:12px;word-break:break-word}.ok{color:#55d68b}.partial{color:#f7c85b}.bad{color:#ff7777}.toolbar{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:12px}input,button{border:1px solid #33415b;background:#111827;color:#eef4ff;border-radius:9px;padding:9px}button{cursor:pointer;font-weight:600}.actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px}pre{white-space:pre-wrap;max-height:260px;overflow:auto;background:#0d121d;border-radius:9px;padding:10px;font-size:11px}.hidden{display:none}</style></head><body><div class="card"><div class="head"><div><div class="title" id="title">OrbitFS</div><div class="muted" id="subtitle">Waiting for startup result…</div></div><div class="pill" id="strength">—</div></div><div class="stats" id="stats"></div><div class="files" id="files"></div><div class="toolbar"><input id="path" placeholder="Folder path"><button id="browse">Browse</button></div><div class="toolbar"><input id="query" placeholder="Search file contents"><button id="search">Search</button></div><div class="actions"><button id="refresh">Refresh startup</button><button id="clear">Clear output</button></div><pre id="output" class="hidden"></pre></div><script>let seq=1;const pending=new Map();let lastInput={project:'Master',loadstrength:'med'};function rpc(method,params){const id=seq++;window.parent.postMessage({jsonrpc:'2.0',id,method,params},'*');return new Promise((resolve,reject)=>pending.set(id,{resolve,reject}));}function callTool(name,args){return rpc('tools/call',{name,arguments:args});}function textFrom(r){return(r?.content||[]).map(x=>x.text||'').join('\n');}function showOutput(t){const e=document.getElementById('output');e.textContent=t||'(no output)';e.classList.remove('hidden');}function esc(v){return String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}function render(d){if(!d)return;lastInput={project:(d.projects||['Master']).join(':'),loadstrength:d.loadstrength||'med'};title.textContent=`${(d.projects||[]).join(' + ')||'OrbitFS'} active`;subtitle.textContent='Loaded into this chat';strength.textContent=(d.loadstrength||'').toUpperCase();stats.innerHTML=`<span class="pill">${d.loadedFileCount||0} loaded</span><span class="pill">${d.truncatedFileCount||0} partial</span><span class="pill">${d.totalCharactersLoaded||0} chars</span>`;files.innerHTML=(d.visibleLoadedFiles||[]).map(f=>`<div class="file"><span class="${f.status==='loaded'?'ok':f.status==='partial'?'partial':'bad'}">${f.status==='loaded'?'✓':f.status==='partial'?'◐':'✗'}</span><span>${esc(f.path)}</span></div>`).join('')||'<div class="muted">No working files returned.</div>';}window.addEventListener('message',e=>{if(e.source!==window.parent)return;const m=e.data;if(!m||m.jsonrpc!=='2.0')return;if(m.id&&pending.has(m.id)){const p=pending.get(m.id);pending.delete(m.id);m.error?p.reject(m.error):p.resolve(m.result);return;}if(m.method==='ui/notifications/tool-input')lastInput=m.params?.arguments||lastInput;if(m.method==='ui/notifications/tool-result')render(m.params?.structuredContent);});if(window.openai?.toolOutput)render(window.openai.toolOutput);browse.onclick=async()=>{try{showOutput(textFrom(await callTool('list_files',{subpath:path.value.trim(),recursive:false})));}catch(e){showOutput(e.message||JSON.stringify(e));}};search.onclick=async()=>{try{if(!query.value.trim())return;showOutput(textFrom(await callTool('search_files',{query:query.value.trim()})));}catch(e){showOutput(e.message||JSON.stringify(e));}};refresh.onclick=async()=>{try{const r=await callTool('startup',lastInput);render(r?.structuredContent);showOutput(textFrom(r));}catch(e){showOutput(e.message||JSON.stringify(e));}};clear.onclick=()=>output.classList.add('hidden');</script></body></html>
