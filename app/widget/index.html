<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<style>
:root{font-family:Inter,system-ui,sans-serif;color:#edf3ff;background:#0f1420}
*{box-sizing:border-box}html,body{margin:0;background:#0f1420}body{padding:7px}
.card{width:100%;background:#171e2d;border:1px solid #2b364b;border-radius:13px;padding:10px;overflow:hidden}
.head{display:flex;justify-content:space-between;align-items:center;gap:8px}.title{font-size:16px;font-weight:800}.muted{font-size:12px;color:#9baac2}.pill{font-size:11px;padding:5px 8px;border-radius:999px;background:#222c40}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px}.tabs button.active{background:#315fa8}.panel{display:none;margin-top:10px}.panel.active{display:block}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.toolbar{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:7px;margin-top:8px}.actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}.actions button{flex:1 1 auto}
input,select,button{border:1px solid #34415a;background:#111827;color:#eef4ff;border-radius:8px;padding:9px;min-width:0}button{font-weight:700;cursor:pointer}label{display:grid;gap:4px;font-size:12px}.primary{background:#315fa8}.danger{background:#6b2f39}.hidden{display:none!important}.busy{opacity:.65;pointer-events:none}
select[multiple]{width:100%;min-height:150px;padding:5px}.path{padding:8px;margin-top:8px;background:#111827;border-radius:8px;font-size:12px;overflow-wrap:anywhere}.preview{margin-top:8px;padding:10px;max-height:180px;overflow:auto;white-space:pre-wrap;background:#0c111b;border:1px solid #263248;border-radius:9px;font-size:12px;line-height:1.45}.stats{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}.confirm{margin-top:8px;padding:9px;border:1px solid #42516e;border-radius:9px;background:#111827}
@media(max-width:520px){body{padding:5px}.grid{grid-template-columns:1fr}.tabs{grid-template-columns:repeat(2,1fr)}.tabs button{min-height:42px}.toolbar{grid-template-columns:1fr}.card{border-radius:11px}select[multiple]{min-height:170px}}
</style>
</head>
<body>
<div class="card">
  <div class="head"><div><div id="title" class="title">OrbitFS Hive</div><div id="subtitle" class="muted">Compact context control</div></div><div id="strength" class="pill">—</div></div>
  <div class="tabs"><button data-tab="startup" class="active">Startup</button><button data-tab="files">Files</button><button data-tab="context">Context</button><button data-tab="system">Status</button></div>

  <section id="startup" class="panel active">
    <div class="grid">
      <label>Project<select id="project"><option value="">Select project</option><option value="1. Legal">1. Legal</option><option value="2. Wellbeing">2. Wellbeing</option></select></label>
      <label>Strength<select id="loadstrength"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option><option value="custom1">Custom 1</option><option value="custom2">Custom 2</option></select></label>
    </div>
    <p class="muted">Uses presets configured in the OrbitFS Panel. No file names or paths need to be typed.</p>
    <div class="actions"><button id="start" class="primary">Start</button><button id="mega" class="danger">MEGA</button></div>
  </section>

  <section id="files" class="panel">
    <div id="currentFolder" class="path">/</div>
    <div class="toolbar"><select id="folderChoice"><option value="">Hive root</option></select><button id="openFolder">Open folder</button></div>
    <label style="margin-top:8px">Files and folders<select id="itemSelect" multiple></select></label>
    <div class="actions"><button id="refreshFiles">Refresh</button><button id="previewSelected">Preview selected</button></div>
    <div id="filePreview" class="preview hidden"></div>
    <label style="margin-top:8px">Move selected to<select id="destinationChoice"><option value="">Hive root</option></select></label>
    <div class="actions"><button id="moveSelected" class="primary">Move selected</button><button id="trashSelected" class="danger">Move selected to trash</button></div>
    <label style="margin-top:8px">Rename selected item<input id="renameName" placeholder="New name only"></label>
    <button id="renameSelected" style="margin-top:8px;width:100%">Rename</button>
    <div id="fileMessage" class="confirm hidden"></div>
  </section>

  <section id="context" class="panel">
    <div id="stats" class="stats"></div>
    <label>Active context files<select id="activeSelect" multiple></select></label>
    <div class="actions"><button id="refreshContext">Refresh</button><button id="unloadSelected">Unload selected</button><button id="clearContext" class="danger">Clear unpinned</button></div>
  </section>

  <section id="system" class="panel">
    <p class="muted">Checks the Hive MCP and connected services.</p>
    <button id="serverStatus" class="primary" style="width:100%">Refresh status</button>
    <div id="statusOutput" class="preview hidden"></div>
  </section>
</div>
<script>
let seq=1;const pending=new Map();let currentPath='';let currentEntries=[];
function rpc(method,params){const id=seq++;window.parent.postMessage({jsonrpc:'2.0',id,method,params},'*');return new Promise((resolve,reject)=>pending.set(id,{resolve,reject}));}
function callTool(name,args={}){if(window.openai?.callTool)return window.openai.callTool(name,args);return rpc('tools/call',{name,arguments:args});}
function textFrom(r){return(r?.content||[]).map(x=>x.text||'').join('\n');}
function setBusy(on){document.querySelector('.card').classList.toggle('busy',!!on);}
async function tool(name,args={}){setBusy(true);try{return await callTool(name,args);}finally{setBusy(false);}}
function setTab(name){document.querySelectorAll('[data-tab]').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id===name));if(name==='files')loadFolder(currentPath);if(name==='context')refreshContextData();}
function selectedValues(select){return [...select.selectedOptions].map(o=>o.value).filter(Boolean);}
function joinPath(base,name){return base?`${base}/${name}`:name;}
function parentPath(path){return path.split('/').filter(Boolean).slice(0,-1).join('/');}
function showMessage(text){fileMessage.textContent=text;fileMessage.classList.remove('hidden');}

function parseList(text){return text.split('\n').map(line=>{const match=line.match(/^\[(DIR|FILE)\]\s*(.+)$/);return match?{type:match[1]==='DIR'?'dir':'file',path:match[2].trim()}:null;}).filter(Boolean);}
function fillFolderChoices(entries){
  const folders=entries.filter(e=>e.type==='dir');
  folderChoice.innerHTML='';destinationChoice.innerHTML='';
  const options=[{value:'',label:'Hive root'}];if(currentPath)options.push({value:parentPath(currentPath),label:'.. Parent folder'});options.push(...folders.map(f=>({value:f.path,label:f.path.split('/').pop()})));
  for(const item of options){for(const select of [folderChoice,destinationChoice]){const o=document.createElement('option');o.value=item.value;o.textContent=item.label;select.appendChild(o);}}
}
async function loadFolder(path=''){
  currentPath=path||'';currentFolder.textContent=currentPath?`/${currentPath}`:'/';itemSelect.innerHTML='<option>Loading…</option>';filePreview.classList.add('hidden');fileMessage.classList.add('hidden');
  try{const r=await tool('list_files',{subpath:currentPath,recursive:false});currentEntries=parseList(textFrom(r));itemSelect.innerHTML='';for(const entry of currentEntries){const o=document.createElement('option');o.value=entry.path;o.textContent=`${entry.type==='dir'?'📁':'📄'} ${entry.path.split('/').pop()}`;o.dataset.type=entry.type;itemSelect.appendChild(o);}if(!currentEntries.length)itemSelect.innerHTML='<option disabled>(empty)</option>';fillFolderChoices(currentEntries);}catch(err){itemSelect.innerHTML=`<option disabled>${err.message||err}</option>`;}
}

async function refreshContextData(){
  try{const r=await callTool('list_active_context',{});const d=r.structuredContent||{};const files=d.activeFiles||d.visibleLoadedFiles||[];strength.textContent=(d.loadstrength||loadstrength.value||'').toUpperCase();stats.innerHTML=`<span class="pill">${d.activeFileCount??files.length} active</span><span class="pill">${d.totalCharactersLoaded||0} chars</span>`;activeSelect.innerHTML='';for(const f of files){const o=document.createElement('option');o.value=f.path;o.textContent=f.path;activeSelect.appendChild(o);}if(!files.length)activeSelect.innerHTML='<option disabled>No active Hive files</option>';if(d.projects?.length){title.textContent=`${d.projects.join(' + ')} active`;subtitle.textContent='Loaded into this chat';}}catch{}
}

document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
start.onclick=async()=>{if(!project.value)return alert('Select a project.');const r=await tool('startup',{project:project.value,loadstrength:loadstrength.value,selectedFiles:[]});strength.textContent=loadstrength.value.toUpperCase();await refreshContextData();setTab('context');};
mega.onclick=async()=>{if(!project.value)return alert('Select a project.');if(!confirm('Load as much readable content as possible from 0. Core, 1. Legal and 2. Wellbeing? Archive, trash and sorter are always excluded.'))return;await tool('startup',{project:project.value,loadstrength:'high',mega:true,selectedFiles:[]});await refreshContextData();setTab('context');};
openFolder.onclick=()=>loadFolder(folderChoice.value);refreshFiles.onclick=()=>loadFolder(currentPath);
itemSelect.ondblclick=()=>{const option=itemSelect.selectedOptions[0];if(option?.dataset.type==='dir')loadFolder(option.value);};
previewSelected.onclick=async()=>{const paths=selectedValues(itemSelect);if(paths.length!==1)return showMessage('Select exactly one file to preview.');const entry=currentEntries.find(e=>e.path===paths[0]);if(entry?.type==='dir')return loadFolder(entry.path);const r=await tool('preview_file',{filepath:paths[0]});const d=r.structuredContent?.document;filePreview.textContent=(d?.text||textFrom(r)||'(no preview)').slice(0,3500);filePreview.classList.remove('hidden');};
moveSelected.onclick=async()=>{const paths=selectedValues(itemSelect);if(!paths.length)return showMessage('Select one or more items.');const destination=destinationChoice.value;for(const source of paths){await tool('move_item',{source,destination_folder:destination,confirmed:true});}showMessage(`Moved ${paths.length} item${paths.length===1?'':'s'}.`);loadFolder(currentPath);};
trashSelected.onclick=async()=>{const paths=selectedValues(itemSelect);if(!paths.length)return showMessage('Select one or more items.');if(!confirm(`Move ${paths.length} selected item(s) to trash?`))return;for(const filepath of paths){await tool('move_to_trash',{filepath});}showMessage(`Moved ${paths.length} item${paths.length===1?'':'s'} to trash.`);loadFolder(currentPath);};
renameSelected.onclick=async()=>{const paths=selectedValues(itemSelect);const newName=renameName.value.trim();if(paths.length!==1)return showMessage('Select exactly one item to rename.');if(!newName||newName.includes('/')||newName.includes('\\'))return showMessage('Enter a new name only, not a full path.');await tool('move_item',{source:paths[0],destination_folder:currentPath,new_name:newName,confirmed:true});renameName.value='';showMessage('Renamed.');loadFolder(currentPath);};
refreshContext.onclick=refreshContextData;unloadSelected.onclick=async()=>{for(const filepath of selectedValues(activeSelect)){await callTool('unload_context_file',{filepath});}refreshContextData();};clearContext.onclick=async()=>{if(!confirm('Clear all unpinned context?'))return;await callTool('clear_active_context',{});refreshContextData();};
serverStatus.onclick=async()=>{const r=await tool('get_server_status',{}).catch(()=>tool('server_status',{}));statusOutput.textContent=textFrom(r)||JSON.stringify(r.structuredContent||{},null,2);statusOutput.classList.remove('hidden');};
window.addEventListener('message',e=>{const m=e.data;if(!m)return;if(m.id&&pending.has(m.id)){const p=pending.get(m.id);pending.delete(m.id);m.error?p.reject(new Error(m.error.message||'RPC error')):p.resolve(m.result);}});
</script>
</body>
</html>
