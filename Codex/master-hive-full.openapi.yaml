openapi: 3.1.0
info:
  title: Master Hive Full Actions
  version: 1.0.0
  description: Full ChatGPT Actions for the Master Hive live server. Includes read and write operations.
servers:
  - url: https://YOUR_PUBLIC_BASE_URL
    description: Replace with PUBLIC_BASE_URL from the live server environment.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    HiveFlowHeader:
      name: X-Hive-Flow
      in: header
      required: true
      description: Identifies ChatGPT Actions traffic in Hive logs.
      schema:
        type: string
        enum:
          - chatgpt
        default: chatgpt
  schemas:
    FileEntry:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum:
            - file
            - dir
        size:
          type: number
        mtime:
          type: string
          format: date-time
      required:
        - name
        - type
    FileManifestEntry:
      type: object
      properties:
        path:
          type: string
        size:
          type: number
        mtime:
          type: string
          format: date-time
        sha256:
          type: string
      required:
        - path
        - size
        - mtime
        - sha256
    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok
    TrashMoveResponse:
      type: object
      properties:
        ok:
          type: boolean
        from:
          type: string
        to:
          type: string
      required:
        - ok
        - from
        - to
    TrashEmptyResponse:
      type: object
      properties:
        ok:
          type: boolean
        deleted:
          type: array
          items:
            type: string
        deletedCount:
          type: integer
      required:
        - ok
        - deleted
        - deletedCount
    TrashConfigResponse:
      type: object
      properties:
        ok:
          type: boolean
        retentionDays:
          type: integer
      required:
        - retentionDays
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    StartupResponse:
      type: object
      properties:
        text:
          type: string
      required:
        - text
    FileWebLink:
      type: object
      properties:
        url:
          type: string
        expiresInMinutes:
          type: number
      required:
        - url
        - expiresInMinutes
security:
  - bearerAuth: []
paths:
  /api/ping:
    get:
      operationId: pingHive
      summary: Check whether the Master Hive server is reachable.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
      responses:
        "200":
          description: Server health response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /api/manifest:
    get:
      operationId: getManifest
      summary: Get the full file manifest.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
      responses:
        "200":
          description: File manifest.
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      $ref: "#/components/schemas/FileManifestEntry"
                required:
                  - files
  /api/files:
    get:
      operationId: listFolder
      summary: List files and folders in one Master Hive folder.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
        - name: subpath
          in: query
          required: false
          description: Relative folder path. Omit for the Hive root.
          schema:
            type: string
      responses:
        "200":
          description: Folder entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: "#/components/schemas/FileEntry"
                required:
                  - entries
  /api/file:
    get:
      operationId: readFile
      summary: Read a text file from the Master Hive.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
        - name: path
          in: query
          required: true
          description: Relative file path to read.
          schema:
            type: string
      responses:
        "200":
          description: File contents.
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: string
                required:
                  - content
    put:
      operationId: writeFile
      summary: Create or overwrite a text file in the Master Hive.
      description: Admin action. Require explicit user confirmation before use.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: string
                  description: Relative file path to write.
                content:
                  type: string
                  description: Full text content to write.
              required:
                - path
                - content
      responses:
        "200":
          description: Write result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
    delete:
      operationId: deleteFile
      summary: Delete a file or folder from the Master Hive.
      description: Admin action. Require explicit user confirmation before use.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
        - name: path
          in: query
          required: true
          description: Relative file or folder path to delete.
          schema:
            type: string
      responses:
        "200":
          description: Delete result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /api/move:
    post:
      operationId: moveFile
      summary: Move or rename a file or folder.
      description: Admin action. Require explicit user confirmation before use.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                from:
                  type: string
                  description: Relative source path.
                to:
                  type: string
                  description: Relative destination path.
              required:
                - from
                - to
      responses:
        "200":
          description: Move result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /api/trash:
    post:
      operationId: moveToTrash
      summary: Move a file or folder into _trash.
      description: Admin action. Safer than deleteFile for normal user-facing deletes because it preserves the original relative path under a timestamped trash entry.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: string
                  description: Relative file or folder path to move into _trash.
              required:
                - path
      responses:
        "200":
          description: Trash move result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrashMoveResponse"
  /api/trash/empty:
    post:
      operationId: emptyTrash
      summary: Permanently delete everything currently inside _trash.
      description: High-risk admin action. Require explicit user confirmation before use.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
      responses:
        "200":
          description: Trash empty result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrashEmptyResponse"
  /api/trash/config:
    get:
      operationId: getTrashConfig
      summary: Get the current _trash auto-purge retention.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
      responses:
        "200":
          description: Current trash retention config.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrashConfigResponse"
    post:
      operationId: setTrashConfig
      summary: Update the _trash auto-purge retention.
      description: Admin action. Require explicit user confirmation before use.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                retentionDays:
                  type: integer
                  description: Number of days to keep trash entries before auto-purge.
              required:
                - retentionDays
      responses:
        "200":
          description: Updated trash retention config.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/TrashConfigResponse"
                  - type: object
                    required:
                      - ok
  /api/mkdir:
    post:
      operationId: createFolder
      summary: Create a folder in the Master Hive.
      description: Admin action. Require explicit user confirmation before use.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: string
                  description: Relative folder path to create.
              required:
                - path
      responses:
        "200":
          description: Folder creation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /api/download:
    get:
      operationId: downloadFile
      summary: Download a file from the Master Hive.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
        - name: path
          in: query
          required: true
          description: Relative file path to download.
          schema:
            type: string
      responses:
        "200":
          description: File bytes.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
  /api/open-link:
    get:
      operationId: getFileWebLink
      summary: Get a link to open a Master Hive file directly in a browser.
      description: Equivalent to `/openfileweb <file>`. Read-only. Returns a URL that renders the file inline in a browser tab. The link is scoped to this one file and expires in 15 minutes.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
        - name: path
          in: query
          required: true
          description: Relative file path to open.
          schema:
            type: string
      responses:
        "200":
          description: Shareable browser link.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileWebLink"
  /api/upload:
    post:
      operationId: uploadFile
      summary: Upload raw file bytes to the Master Hive.
      description: Admin action. Require explicit user confirmation before use.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
        - name: path
          in: query
          required: true
          description: Relative destination file path.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Upload result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  bytes:
                    type: number
                required:
                  - ok
                  - bytes
  /api/startup:
    post:
      operationId: startupFirestorm
      summary: Load hardcoded Project FireStorm startup context.
      description: Equivalent to `/startup <project> <low|med|high>`. Read-only. Loads FireStorm startup files, the full startup rule set, `_system/Index/file_index.json` when present, and relevant folder listings while excluding Archive folders from startup scope unless explicitly requested.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                project:
                  type: string
                  description: Master, Court, Mental, Media, or combined with `:` such as `Court:Mental`.
                load_level:
                  type: string
                  description: low, med, high. Also accepts light, normal, full.
              required:
                - project
      responses:
        "200":
          description: Startup context payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartupResponse"
  /api/oauth-state:
    get:
      operationId: getOAuthState
      summary: Get registered OAuth clients and refresh-token account summary.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
      responses:
        "200":
          description: OAuth state summary. Does not include token secret values.
          content:
            application/json:
              schema:
                type: object
                properties:
                  clients:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        redirectUris:
                          type: array
                          items:
                            type: string
                      required:
                        - id
                        - redirectUris
                  refreshTokens:
                    type: array
                    items:
                      type: object
                      properties:
                        email:
                          type: string
                      required:
                        - email
                required:
                  - clients
                  - refreshTokens
  /api/sort/preview:
    post:
      operationId: previewSortInbox
      summary: Preview where each item in the _sorter staging folder would go.
      description: Read-only dry run - does not move anything. Show the proposed destinations to the user before calling applySortInbox.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
      responses:
        "200":
          description: Proposed destinations, and any items that could not be classified.
          content:
            application/json:
              schema:
                type: object
                properties:
                  proposals:
                    type: array
                    items:
                      type: object
                      properties:
                        item:
                          type: string
                        isDir:
                          type: boolean
                        destination:
                          type: string
                        isNewFolder:
                          type: boolean
                        reason:
                          type: string
                      required:
                        - item
                        - destination
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        item:
                          type: string
                        error:
                          type: string
                      required:
                        - item
                        - error
                  note:
                    type: string
                required:
                  - proposals
                  - errors
  /api/sort/apply:
    post:
      operationId: applySortInbox
      summary: Move confirmed items out of _sorter to their approved destinations.
      description: Admin action. Only call this after previewSortInbox and explicit user confirmation of each destination - do not guess destinations here.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                moves:
                  type: array
                  items:
                    type: object
                    properties:
                      item:
                        type: string
                        description: Name of the file/folder inside _sorter to move.
                      destination:
                        type: string
                        description: Confirmed destination folder (relative path, no leading/trailing slash).
                    required:
                      - item
                      - destination
              required:
                - moves
      responses:
        "200":
          description: Move results, and any items that failed to move.
          content:
            application/json:
              schema:
                type: object
                properties:
                  moved:
                    type: array
                    items:
                      type: object
                      properties:
                        item:
                          type: string
                        from:
                          type: string
                        to:
                          type: string
                      required:
                        - item
                        - from
                        - to
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        item:
                          type: string
                        error:
                          type: string
                      required:
                        - item
                        - error
                required:
                  - moved
                  - errors

