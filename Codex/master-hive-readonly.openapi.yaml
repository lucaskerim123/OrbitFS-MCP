openapi: 3.1.0
info:
  title: Master Hive Read-Only Actions
  version: 1.0.0
  description: Read-only ChatGPT Actions for the Master Hive live server.
servers:
  - url: https://YOUR_PUBLIC_BASE_URL
    description: Replace with PUBLIC_BASE_URL from the live server environment.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    HiveFlowHeader:
      name: X-Hive-Flow
      in: header
      required: true
      description: Identifies ChatGPT Actions traffic in Hive logs.
      schema:
        type: string
        enum:
          - chatgpt
        default: chatgpt
  schemas:
    FileEntry:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum:
            - file
            - dir
        size:
          type: number
        mtime:
          type: string
          format: date-time
      required:
        - name
        - type
    FileManifestEntry:
      type: object
      properties:
        path:
          type: string
        size:
          type: number
        mtime:
          type: string
          format: date-time
        sha256:
          type: string
      required:
        - path
        - size
        - mtime
        - sha256
    StartupResponse:
      type: object
      properties:
        text:
          type: string
      required:
        - text
    FileStatResponse:
      type: object
      properties:
        size:
          type: number
        mtime:
          type: string
          format: date-time
        sha256:
          type: string
      required:
        - size
        - mtime
        - sha256
    SearchMatch:
      type: object
      properties:
        path:
          type: string
        line:
          type: integer
        text:
          type: string
      required:
        - path
        - line
        - text
    ServerStatusResponse:
      type: object
      properties:
        text:
          type: string
        chatgptConnectionStatus:
          type: string
        claudeConnectionStatus:
          type: string
      required:
        - text
        - chatgptConnectionStatus
        - claudeConnectionStatus
    FileWebLink:
      type: object
      properties:
        url:
          type: string
        expiresInMinutes:
          type: number
      required:
        - url
        - expiresInMinutes
security:
  - bearerAuth: []
paths:
  /api/ping:
    get:
      operationId: pingHive
      summary: Check whether the Master Hive server is reachable.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
      responses:
        "200":
          description: Server health response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required:
                  - ok
  /api/files:
    get:
      operationId: listFolder
      summary: List files and folders in one Master Hive folder.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
        - name: subpath
          in: query
          required: false
          description: Relative folder path. Omit for the Hive root.
          schema:
            type: string
      responses:
        "200":
          description: Folder entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: "#/components/schemas/FileEntry"
                required:
                  - entries
  /api/file:
    get:
      operationId: readFile
      summary: Read a text file from the Master Hive.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
        - name: path
          in: query
          required: true
          description: Relative file path to read.
          schema:
            type: string
      responses:
        "200":
          description: File contents.
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: string
                required:
                  - content
  /api/manifest:
    get:
      operationId: getManifest
      summary: Get the full read-only file manifest.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
      responses:
        "200":
          description: File manifest.
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      $ref: "#/components/schemas/FileManifestEntry"
                required:
                  - files
  /api/stat:
    get:
      operationId: statFile
      summary: Get file size, modified time, and sha256 hash.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
        - name: path
          in: query
          required: true
          description: Relative file path to inspect.
          schema:
            type: string
      responses:
        "200":
          description: File metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileStatResponse"
  /api/search:
    get:
      operationId: searchFiles
      summary: Search text file contents for a substring.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
        - name: query
          in: query
          required: true
          description: Text to search for.
          schema:
            type: string
        - name: subpath
          in: query
          required: false
          description: Relative folder path to search. Omit for the Hive root.
          schema:
            type: string
      responses:
        "200":
          description: Matching lines.
          content:
            application/json:
              schema:
                type: object
                properties:
                  matches:
                    type: array
                    items:
                      $ref: "#/components/schemas/SearchMatch"
                required:
                  - matches
  /api/startup:
    post:
      operationId: startupFirestorm
      summary: Load hardcoded Project FireStorm startup context.
      description: Equivalent to `/startup <project> <low|med|high>`. Read-only. Always loads readable Logs and Profiles content, Luke and Laura mental-health profiles, and core.docx; med/high also load bounded indexed/discovered project files. Archive and Pure Vent Mode are excluded.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                project:
                  type: string
                  description: Master, Court, Mental, Media, or combined with `:` such as `Court:Mental`.
                load_level:
                  type: string
                  description: low, med, high. Also accepts light, normal, full.
              required:
                - project
      responses:
        "200":
          description: Startup context payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartupResponse"
  /api/server-status:
    get:
      operationId: getServerStatus
      summary: Get a live status report for Master Brain, Hive, ChatGPT, and Claude.
      description: Equivalent to `/server-status`. Returns a preformatted status report plus key status fields derived from live local checks, Windows service state, tunnel state, OAuth registrations, and recent Hive errors.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
      responses:
        "200":
          description: Live status report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerStatusResponse"
  /api/open-link:
    get:
      operationId: getFileWebLink
      summary: Get a link to open a Master Hive file directly in a browser.
      description: Equivalent to `/openfileweb <file>`. Read-only. Returns a URL that renders the file inline in a browser tab. The link is scoped to this one file and expires in 15 minutes.
      parameters:
        - $ref: "#/components/parameters/HiveFlowHeader"
        - name: path
          in: query
          required: true
          description: Relative file path to open.
          schema:
            type: string
      responses:
        "200":
          description: Shareable browser link.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileWebLink"

