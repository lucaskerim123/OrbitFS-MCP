name: Apply mobile audit fixes

on:
  push:
    branches:
      - audit/mobile-real-ui-sync

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/mobile-real-ui-sync
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Apply focused audit patch
        run: node scripts/apply-mobile-audit.mjs
      - name: Verify syntax
        run: |
          node --check server.js
          node --check server-core.js
      - name: Commit generated fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server.js server-core.js app/widget/index.html
          git diff --cached --quiet || git commit -m "Apply real mobile UI and high-load fixes"
          git push
