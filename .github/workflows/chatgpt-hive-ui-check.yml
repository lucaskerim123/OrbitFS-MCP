name: ChatGPT Hive UI check

on:
  push:
    branches:
      - feature/chatgpt-hive-ui-context
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Check server syntax
        run: |
          node --check server.js
          node --check server-core.js
