name: ChatGPT Hive UI check

on:
  pull_request:

permissions:
  contents: write

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Apply focused audit patch
        run: node scripts/apply-mobile-audit.mjs
      - name: Check server syntax
        run: |
          node --check server.js
          node --check server-core.js
      - name: Commit applied fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server.js server-core.js app/widget/index.html
          git diff --cached --quiet || git commit -m "Apply real mobile UI and high-load fixes"
          git push
