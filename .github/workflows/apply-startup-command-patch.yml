name: Apply startup command migration

on:
  push:
    paths:
      - ".github/scripts/patch-startup-command.mjs"
      - ".github/workflows/apply-startup-command-patch.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Patch startup command
        run: node .github/scripts/patch-startup-command.mjs
      - name: Validate syntax
        run: node --check server.js
      - name: Commit patched server
        run: |
          if git diff --quiet -- server.js; then
            echo "No startup patch changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server.js
          git commit -m "Replace startup_firestorm with startup"
          git push

# Triggered after workflow registration so the push event is processed.
