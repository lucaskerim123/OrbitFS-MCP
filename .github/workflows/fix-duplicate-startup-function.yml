name: Repair MCP startup

on:
  push:
    paths:
      - .github/workflows/fix-duplicate-startup-function.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Remove duplicate startup resolver
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('server.js')
          s=p.read_text(encoding='utf-8')
          marker='async function resolveStartupPath(filepath) {'
          first=s.find(marker)
          second=s.find(marker, first+1)
          if second!=-1:
              end=s.find('\nasync function readableStartupText', second)
              if end==-1:
                  raise SystemExit('Could not locate duplicate function end')
              s=s[:second]+s[end+1:]
          p.write_text(s,encoding='utf-8')
          PY
      - name: Verify syntax
        run: node --check server.js
      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server.js
          git diff --cached --quiet || git commit -m "Fix duplicate startup resolver preventing MCP launch"
          git push
