name: Finalize startup and UI

on:
  push:
    paths:
      - ".github/workflows/finalize-startup-ui.yml"
      - "scripts/apply-startup-ui.mjs"
      - "app/widget/index.html"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Apply startup and UI changes
        run: node scripts/apply-startup-ui.mjs

      - name: Restore normal package scripts
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.scripts = {
            start: 'node server.js',
            test: 'node --check server.js'
          };
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          NODE
          rm -f scripts/apply-startup-ui.mjs server.js.before-startup-ui

      - name: Validate final server
        run: |
          node --check server.js
          ! grep -q 'startup_firestorm' server.js
          ! grep -q 'load_level' server.js
          grep -q 'registerResource' server.js
          grep -q '"startup"' server.js

      - name: Commit final direct implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server.js package.json app/widget/index.html
          git rm -f scripts/apply-startup-ui.mjs
          git rm -f .github/workflows/finalize-startup-ui.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Integrate startup command and ChatGPT UI directly"
          git push
